<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Kcal Macros</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
    background:#f2f2f7;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px 12px;
}

.card{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:28px;
    padding:22px;
    box-shadow:
        0 10px 30px rgba(0,0,0,0.08),
        0 4px 10px rgba(0,0,0,0.04);
}

h1{
    text-align:center;
    margin-bottom:24px;
    font-size:clamp(28px, 5vw, 36px);
    font-weight:700;
    color:#007aff;
    letter-spacing:-0.5px;
}

.input-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:10px;
    font-size:15px;
    font-weight:600;
    color:#444;
}

input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:#f2f2f7;
    font-size:18px;
    outline:none;
    transition:0.2s;
}

input:focus{
    background:#e9ecf3;
}

.table-wrapper{
    width:100%;
    overflow-x:auto;
    border-radius:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:320px;
    overflow:hidden;
    border-radius:20px;
}

thead{
    background:#111827;
    color:white;
}

th{
    padding:16px 10px;
    font-size:14px;
    font-weight:700;
    text-align:center;
}

td{
    padding:15px 10px;
    text-align:center;
    font-size:14px;
    border-bottom:1px solid #ececec;
}

tbody tr:last-child td{
    border-bottom:none;
}

tbody tr:nth-child(even){
    background:#fafafa;
}

.metric{
    font-weight:600;
    text-align:left;
    color:#222;
}

.highlight{
    font-weight:700;
    color:#007aff;
}

/* MOBILE OPTIMIZATION */

@media (max-width: 480px){

    .card{
        padding:18px;
        border-radius:24px;
    }

    th{
        font-size:13px;
        padding:14px 8px;
    }

    td{
        font-size:13px;
        padding:14px 8px;
    }

    input{
        font-size:17px;
        padding:15px;
    }

    .metric{
        font-size:13px;
    }
}

</style>
</head>

<body>

<div class="card">

    <h1>Kcal Macros</h1>

    <div class="input-group">
        <label for="weight">Weight (kg)</label>
        <input 
            type="number" 
            id="weight" 
            placeholder="Enter your weight"
        />
    </div>

    <div class="table-wrapper">

        <table>

            <thead>
                <tr>
                    <th></th>
                    <th>Slabit</th>
                    <th>Mentinere</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td class="metric">Kcal</td>
                    <td id="slabitKcal" class="highlight">-</td>
                    <td id="maintainKcal" class="highlight">-</td>
                </tr>

                <tr>
                    <td class="metric">Protein</td>
                    <td id="slabitProtein">-</td>
                    <td id="maintainProtein">-</td>
                </tr>

                <tr>
                    <td class="metric">Carbs</td>
                    <td id="slabitCarbs">-</td>
                    <td id="maintainCarbs">-</td>
                </tr>

                <tr>
                    <td class="metric">Fat</td>
                    <td id="slabitFat">-</td>
                    <td id="maintainFat">-</td>
                </tr>

                <tr>
                    <td class="metric">Fiber</td>
                    <td id="slabitFiber">-</td>
                    <td id="maintainFiber">-</td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

const weightInput = document.getElementById("weight");

weightInput.addEventListener("input", calculate);

function calculate(){

    const kg = parseFloat(weightInput.value);

    if(!kg || kg <= 0){
        clearValues();
        return;
    }

    // =========================
    // SLABIT
    // =========================

    const slabitKcal = (kg * 22) - 26;
    const slabitProtein = kg * 2.2;
    const slabitFat = kg * 0.6;

    const slabitCarbs =
        ((slabitProtein * 4) + (slabitFat * 9)) / 4;

    const slabitFiber =
        (14 / 1000) * slabitKcal;

    // =========================
    // MENTINERE
    // =========================

    const maintainKcal = (kg * 28) - 33;
    const maintainProtein = kg * 2;

    const maintainFat =
        ((kg * 0.6) + (kg * 1)) / 2;

    const maintainCarbs =
        ((maintainProtein * 4) + (maintainFat * 9)) / 4;

    const maintainFiber =
        (14 / 1000) * maintainKcal;

    // =========================
    // OUTPUT
    // =========================

    document.getElementById("slabitKcal").innerText =
        Math.round(slabitKcal) + " kcal";

    document.getElementById("slabitProtein").innerText =
        Math.round(slabitProtein) + " g";

    document.getElementById("slabitCarbs").innerText =
        Math.round(slabitCarbs) + " g";

    document.getElementById("slabitFat").innerText =
        Math.round(slabitFat) + " g";

    document.getElementById("slabitFiber").innerText =
        Math.round(slabitFiber) + " g";

    document.getElementById("maintainKcal").innerText =
        Math.round(maintainKcal) + " kcal";

    document.getElementById("maintainProtein").innerText =
        Math.round(maintainProtein) + " g";

    document.getElementById("maintainCarbs").innerText =
        Math.round(maintainCarbs) + " g";

    document.getElementById("maintainFat").innerText =
        Math.round(maintainFat) + " g";

    document.getElementById("maintainFiber").innerText =
        Math.round(maintainFiber) + " g";
}

function clearValues(){

    const ids = [
        "slabitKcal",
        "slabitProtein",
        "slabitCarbs",
        "slabitFat",
        "slabitFiber",
        "maintainKcal",
        "maintainProtein",
        "maintainCarbs",
        "maintainFat",
        "maintainFiber"
    ];

    ids.forEach(id=>{
        document.getElementById(id).innerText = "-";
    });
}

</script>

</body>
</html>

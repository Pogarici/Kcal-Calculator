<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Kcal Macros</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
    background:#f2f2f7;
    padding:14px;
    color:#111;
}

.container{
    width:100%;
    max-width:420px;
    margin:0 auto;
}

.card{
    background:white;
    border-radius:24px;
    padding:18px;
    box-shadow:
        0 4px 20px rgba(0,0,0,0.06);
}

h1{
    text-align:center;
    color:#007aff;
    font-size:28px;
    font-weight:700;
    margin-bottom:20px;
    letter-spacing:-0.5px;
}

.input-label{
    font-size:14px;
    font-weight:600;
    margin-bottom:8px;
    color:#555;
}

input{
    width:100%;
    border:none;
    background:#f2f2f7;
    border-radius:16px;
    padding:15px;
    font-size:18px;
    margin-bottom:20px;
    outline:none;
}

.section{
    margin-bottom:18px;
}

.section-title{
    font-size:16px;
    font-weight:700;
    margin-bottom:10px;
    padding-left:4px;
}

.blue{
    color:#007aff;
}

.dark{
    color:#111827;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f8f8fa;
    padding:14px 16px;
    border-radius:16px;
    margin-bottom:10px;
}

.metric{
    font-size:15px;
    font-weight:600;
    color:#333;
}

.value{
    font-size:15px;
    font-weight:700;
    color:#007aff;
    text-align:right;
}

/* SMALL DEVICES */

@media (max-width:380px){

    h1{
        font-size:24px;
    }

    .row{
        padding:12px;
    }

    .metric,
    .value{
        font-size:14px;
    }

    input{
        font-size:16px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Kcal Macros</h1>

        <div class="input-label">
            Weight (kg)
        </div>

        <input 
            type="number" 
            id="weight" 
            placeholder="Enter your weight"
        >

        <!-- SLABIT -->

        <div class="section">

            <div class="section-title blue">
                Slabit
            </div>

            <div class="row">
                <div class="metric">Kcal</div>
                <div class="value" id="slabitKcal">-</div>
            </div>

            <div class="row">
                <div class="metric">Protein</div>
                <div class="value" id="slabitProtein">-</div>
            </div>

            <div class="row">
                <div class="metric">Carbs</div>
                <div class="value" id="slabitCarbs">-</div>
            </div>

            <div class="row">
                <div class="metric">Fat</div>
                <div class="value" id="slabitFat">-</div>
            </div>

            <div class="row">
                <div class="metric">Fiber</div>
                <div class="value" id="slabitFiber">-</div>
            </div>

        </div>

        <!-- MENTINERE -->

        <div class="section">

            <div class="section-title dark">
                Mentinere
            </div>

            <div class="row">
                <div class="metric">Kcal</div>
                <div class="value" id="maintainKcal">-</div>
            </div>

            <div class="row">
                <div class="metric">Protein</div>
                <div class="value" id="maintainProtein">-</div>
            </div>

            <div class="row">
                <div class="metric">Carbs</div>
                <div class="value" id="maintainCarbs">-</div>
            </div>

            <div class="row">
                <div class="metric">Fat</div>
                <div class="value" id="maintainFat">-</div>
            </div>

            <div class="row">
                <div class="metric">Fiber</div>
                <div class="value" id="maintainFiber">-</div>
            </div>

        </div>

    </div>

</div>

<script>

const weightInput = document.getElementById("weight");

weightInput.addEventListener("input", calculate);

function calculate(){

    const kg = parseFloat(weightInput.value);

    if(!kg || kg <= 0){
        clearValues();
        return;
    }

    // SLABIT

    const slabitKcal = (kg * 22) - 26;
    const slabitProtein = kg * 2.2;
    const slabitFat = kg * 0.6;

    const slabitCarbs =
        ((slabitProtein * 4) + (slabitFat * 9)) / 4;

    const slabitFiber =
        (14 / 1000) * slabitKcal;

    // MENTINERE

    const maintainKcal = (kg * 28) - 33;
    const maintainProtein = kg * 2;

    const maintainFat =
        ((kg * 0.6) + (kg * 1)) / 2;

    const maintainCarbs =
        ((maintainProtein * 4) + (maintainFat * 9)) / 4;

    const maintainFiber =
        (14 / 1000) * maintainKcal;

    // OUTPUT

    document.getElementById("slabitKcal").innerText =
        Math.round(slabitKcal) + " kcal";

    document.getElementById("slabitProtein").innerText =
        Math.round(slabitProtein) + " g";

    document.getElementById("slabitCarbs").innerText =
        Math.round(slabitCarbs) + " g";

    document.getElementById("slabitFat").innerText =
        Math.round(slabitFat) + " g";

    document.getElementById("slabitFiber").innerText =
        Math.round(slabitFiber) + " g";

    document.getElementById("maintainKcal").innerText =
        Math.round(maintainKcal) + " kcal";

    document.getElementById("maintainProtein").innerText =
        Math.round(maintainProtein) + " g";

    document.getElementById("maintainCarbs").innerText =
        Math.round(maintainCarbs) + " g";

    document.getElementById("maintainFat").innerText =
        Math.round(maintainFat) + " g";

    document.getElementById("maintainFiber").innerText =
        Math.round(maintainFiber) + " g";
}

function clearValues(){

    const ids = [
        "slabitKcal",
        "slabitProtein",
        "slabitCarbs",
        "slabitFat",
        "slabitFiber",
        "maintainKcal",
        "maintainProtein",
        "maintainCarbs",
        "maintainFat",
        "maintainFiber"
    ];

    ids.forEach(id=>{
        document.getElementById(id).innerText = "-";
    });
}

</script>

</body>
</html>

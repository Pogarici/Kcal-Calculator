<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>Kcal Macros</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

html{
    font-size:16px;
}

body{
    background:#f2f2f7;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:14px 8px;
}

/* =========================
   CARD
========================= */

.card{
    width:100%;
    max-width:480px;
    background:white;
    border-radius:24px;
    padding:18px;
    box-shadow:
        0 10px 30px rgba(0,0,0,0.08),
        0 4px 10px rgba(0,0,0,0.04);
}

/* =========================
   TITLE
========================= */

h1{
    text-align:center;
    margin-bottom:20px;
    font-size:clamp(1.8rem, 5vw, 2.2rem);
    font-weight:700;
    color:#007aff;
    letter-spacing:-0.5px;
}

/* =========================
   INPUT
========================= */

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:0.9rem;
    font-weight:600;
    color:#444;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    background:#f2f2f7;
    font-size:1rem;
    outline:none;
    transition:0.2s;
    appearance:none;
    -webkit-appearance:none;
}

input:focus{
    background:#e9ecf3;
}

/* =========================
   TABLE
========================= */

.table-wrapper{
    width:100%;
    overflow:hidden;
    border-radius:18px;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

thead{
    background:#111827;
    color:white;
}

th{
    padding:12px 4px;
    font-size:0.82rem;
    font-weight:700;
    text-align:center;
    white-space:nowrap;
}

td{
    padding:11px 4px;
    text-align:center;
    font-size:0.82rem;
    border-bottom:1px solid #ececec;
    word-break:break-word;
    line-height:1.1;
}

th:first-child,
td:first-child{
    width:28%;
}

th:nth-child(2),
th:nth-child(3),
td:nth-child(2),
td:nth-child(3){
    width:36%;
}

tbody tr:last-child td{
    border-bottom:none;
}

tbody tr:nth-child(even){
    background:#fafafa;
}

.metric{
    font-weight:600;
    text-align:left;
    color:#222;
    padding-left:8px;
}

.highlight{
    font-weight:700;
    color:#007aff;
}

/* =========================
   DROPDOWNS
========================= */

.dropdown{
    margin-top:16px;
    border-radius:18px;
    overflow:hidden;
    background:#f8f8fa;
    border:1px solid #ececec;
}

.dropdown-btn{
    width:100%;
    border:none;
    background:white;
    padding:16px;
    font-size:0.9rem;
    font-weight:700;
    color:#111827;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
}

.dropdown-btn:active{
    background:#f2f2f7;
}

.arrow{
    transition:0.25s ease;
    font-size:0.9rem;
}

.dropdown.active .arrow{
    transform:rotate(180deg);
}

.dropdown-content{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.3s ease;
    background:#fafafa;
}

.dropdown-inner{
    padding:16px;
    font-size:0.85rem;
    color:#555;
    line-height:1.5;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 480px){

    body{
        padding:8px 4px;
    }

    .card{
        padding:14px;
        border-radius:20px;
    }

    h1{
        margin-bottom:18px;
        font-size:1.6rem;
    }

    label{
        font-size:0.82rem;
    }

    input{
        padding:12px;
        font-size:0.92rem;
    }

    th{
        font-size:0.72rem;
        padding:10px 2px;
    }

    td{
        font-size:0.72rem;
        padding:10px 2px;
    }

    .metric{
        font-size:0.72rem;
        padding-left:6px;
    }

    .dropdown-btn{
        font-size:0.8rem;
        padding:14px;
    }

    .dropdown-inner{
        font-size:0.78rem;
    }
}

@media (max-width: 360px){

    h1{
        font-size:1.45rem;
    }

    th,
    td,
    .metric{
        font-size:0.68rem;
    }

    input{
        font-size:0.85rem;
    }

    td{
        padding:9px 1px;
    }
}

</style>
</head>

<body>

<div class="card">

    <h1>Kcal Macros</h1>

    <div class="input-group">

        <label for="weight">
            Weight (kg)
        </label>

        <input 
            type="number" 
            id="weight" 
            placeholder="Enter your weight"
        />

    </div>

    <div class="table-wrapper">

        <table>

            <thead>

                <tr>
                    <th></th>
                    <th>Slabit</th>
                    <th>Mentinere</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td class="metric">Kcal</td>
                    <td id="slabitKcal" class="highlight">-</td>
                    <td id="maintainKcal" class="highlight">-</td>
                </tr>

                <tr>
                    <td class="metric">Protein</td>
                    <td id="slabitProtein">-</td>
                    <td id="maintainProtein">-</td>
                </tr>

                <tr>
                    <td class="metric">Carbs</td>
                    <td id="slabitCarbs">-</td>
                    <td id="maintainCarbs">-</td>
                </tr>

                <tr>
                    <td class="metric">Fat</td>
                    <td id="slabitFat">-</td>
                    <td id="maintainFat">-</td>
                </tr>

                <tr>
                    <td class="metric">Fiber</td>
                    <td id="slabitFiber">-</td>
                    <td id="maintainFiber">-</td>
                </tr>

            </tbody>

        </table>

    </div>

    <!-- =========================
         DROPDOWN 1
    ========================== -->

    <div class="dropdown">

        <button class="dropdown-btn">
            <span>3 Meals + 1 Snack</span>
            <span class="arrow">▼</span>
        </button>

        <div class="dropdown-content">

            <div class="dropdown-inner">

                Content will be added here later.

            </div>

        </div>

    </div>

    <!-- =========================
         DROPDOWN 2
    ========================== -->

    <div class="dropdown">

        <button class="dropdown-btn">
            <span>2 Meals + 2 Snacks</span>
            <span class="arrow">▼</span>
        </button>

        <div class="dropdown-content">

            <div class="dropdown-inner">

                Content will be added here later.

            </div>

        </div>

    </div>

</div>

<script>

const weightInput = document.getElementById("weight");

weightInput.addEventListener("input", calculate);

function calculate(){

    const kg = parseFloat(weightInput.value);

    if(!kg || kg <= 0){
        clearValues();
        return;
    }

    // =========================
    // SLABIT
    // =========================

    const slabitKcal = (kg * 22) - 26;
    const slabitProtein = kg * 2.2;
    const slabitFat = kg * 0.6;

    const slabitCarbs =
        ((slabitProtein * 4) + (slabitFat * 9)) / 4;

    const slabitFiber =
        (14 / 1000) * slabitKcal;

    // =========================
    // MENTINERE
    // =========================

    const maintainKcal = (kg * 28) - 33;
    const maintainProtein = kg * 2;

    const maintainFat =
        ((kg * 0.6) + (kg * 1)) / 2;

    const maintainCarbs =
        ((maintainProtein * 4) + (maintainFat * 9)) / 4;

    const maintainFiber =
        (14 / 1000) * maintainKcal;

    // =========================
    // OUTPUT
    // =========================

    document.getElementById("slabitKcal").innerText =
        Math.round(slabitKcal) + " kcal";

    document.getElementById("slabitProtein").innerText =
        Math.round(slabitProtein) + " g";

    document.getElementById("slabitCarbs").innerText =
        Math.round(slabitCarbs) + " g";

    document.getElementById("slabitFat").innerText =
        Math.round(slabitFat) + " g";

    document.getElementById("slabitFiber").innerText =
        Math.round(slabitFiber) + " g";

    document.getElementById("maintainKcal").innerText =
        Math.round(maintainKcal) + " kcal";

    document.getElementById("maintainProtein").innerText =
        Math.round(maintainProtein) + " g";

    document.getElementById("maintainCarbs").innerText =
        Math.round(maintainCarbs) + " g";

    document.getElementById("maintainFat").innerText =
        Math.round(maintainFat) + " g";

    document.getElementById("maintainFiber").innerText =
        Math.round(maintainFiber) + " g";
}

function clearValues(){

    const ids = [
        "slabitKcal",
        "slabitProtein",
        "slabitCarbs",
        "slabitFat",
        "slabitFiber",
        "maintainKcal",
        "maintainProtein",
        "maintainCarbs",
        "maintainFat",
        "maintainFiber"
    ];

    ids.forEach(id=>{
        document.getElementById(id).innerText = "-";
    });
}

/* =========================
   DROPDOWNS
========================= */

const dropdowns = document.querySelectorAll(".dropdown");

dropdowns.forEach(dropdown=>{

    const button =
        dropdown.querySelector(".dropdown-btn");

    const content =
        dropdown.querySelector(".dropdown-content");

    button.addEventListener("click", ()=>{

        dropdown.classList.toggle("active");

        if(content.style.maxHeight){
            content.style.maxHeight = null;
        }else{
            content.style.maxHeight =
                content.scrollHeight + "px";
        }

    });

});

</script>

</body>
</html>
